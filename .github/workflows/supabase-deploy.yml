name: Deploy Supabase

# Mantiene el proyecto remoto de Supabase siempre al día:
#   - Aplica las migraciones SQL nuevas (supabase db push)
#   - Despliega todas las Edge Functions (supabase functions deploy)
#
# Se ejecuta automáticamente en cada push a main que toque supabase/, y
# también puede lanzarse manualmente desde la pestaña Actions.

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

# Evita despliegues concurrentes que podrían pisarse entre sí.
concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Push migrations & deploy functions
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al proyecto remoto
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Aplicar migraciones SQL
        run: supabase db push

      - name: Desplegar Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
